<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore The World 🌍</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="countries-page">
    <!-- Animated Background -->
    <div class="animated-background">
        <div class="gradient-bg"></div>
    </div>

    <!-- Navigation Bar -->
    <nav class="nav-bar countries-nav">
        <button class="nav-btn back-btn" onclick="goBackToHero()">
            <i class="fas fa-arrow-left"></i>
            <span>Back</span>
        </button>
        <div class="nav-title">Explore World</div>
        <div></div>
    </nav>

    <!-- Page Header -->
    <div class="countries-header">
        <h1 class="countries-title">Explore The World 🌍</h1>
        <p class="countries-subtitle">20 Beautiful Countries Selected For Khushi</p>
    </div>

    <!-- Countries Grid -->
    <div class="countries-container">
        <div class="countries-grid" id="countriesGrid">
            <!-- Countries will be generated by JavaScript -->
        </div>
    </div>

    <!-- Loading Indicator -->
    <div class="loading-indicator" id="loading">
        <div class="spinner"></div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        // Countries data
        const countriesData = [
            {
                name: 'Switzerland',
                description: 'Land of mountains, chocolate, and breathtaking Alpine scenery.',
                image: '{{ url_for("static", filename="images/countries/switzerland.jpg") }}'
            },
            {
                name: 'Japan',
                description: 'Where tradition meets cutting-edge technology and natural beauty.',
                image: '{{ url_for("static", filename="images/countries/japan.jpg") }}'
            },
            {
                name: 'Italy',
                description: 'Home of art, history, passion, and the most delicious cuisine.',
                image: '{{ url_for("static", filename="images/countries/italy.jpg") }}'
            },
            {
                name: 'France',
                description: 'The city of love, art, and sophisticated elegance.',
                image: '{{ url_for("static", filename="images/countries/france.jpg") }}'
            },
            {
                name: 'Norway',
                description: 'Majestic fjords, Northern Lights, and pristine nature.',
                image: '{{ url_for("static", filename="images/countries/norway.jpg") }}'
            },
            {
                name: 'New Zealand',
                description: 'Dramatic landscapes, adventure, and pure natural beauty.',
                image: '{{ url_for("static", filename="images/countries/newzealand.jpg") }}'
            },
            {
                name: 'Canada',
                description: 'Vast wilderness, stunning national parks, and friendly people.',
                image: '{{ url_for("static", filename="images/countries/canada.jpg") }}'
            },
            {
                name: 'Iceland',
                description: 'A land of fire and ice with otherworldly landscapes.',
                image: '{{ url_for("static", filename="images/countries/iceland.jpg") }}'
            },
            {
                name: 'Greece',
                description: 'Ancient history, whitewashed villages, and crystal blue seas.',
                image: '{{ url_for("static", filename="images/countries/greece.jpg") }}'
            },
            {
                name: 'Australia',
                description: 'Unique wildlife, stunning beaches, and outback adventures.',
                image: '{{ url_for("static", filename="images/countries/australia.jpg") }}'
            },
            {
                name: 'Maldives',
                description: 'Tropical paradise with turquoise waters and luxury resorts.',
                image: '{{ url_for("static", filename="images/countries/maldives.jpg") }}'
            },
            {
                name: 'Finland',
                description: 'Land of a thousand lakes, Northern Lights, and Santa magic.',
                image: '{{ url_for("static", filename="images/countries/finland.jpg") }}'
            },
            {
                name: 'Austria',
                description: 'Imperial history, Alpine beauty, and classical music.',
                image: '{{ url_for("static", filename="images/countries/austria.jpg") }}'
            },
            {
                name: 'Scotland',
                description: 'Mysterious highlands, ancient castles, and rolling green valleys.',
                image: '{{ url_for("static", filename="images/countries/scotland.jpg") }}'
            },
            {
                name: 'South Korea',
                description: 'Modern metropolis meets traditional culture and K-pop energy.',
                image: '{{ url_for("static", filename="images/countries/southkorea.jpg") }}'
            },
            {
                name: 'Indonesia',
                description: 'Tropical islands, ancient temples, and exotic spices.',
                image: '{{ url_for("static", filename="images/countries/indonesia.jpg") }}'
            },
            {
                name: 'Thailand',
                description: 'Golden temples, bustling markets, and warm hospitality.',
                image: '{{ url_for("static", filename="images/countries/thailand.jpg") }}'
            },
            {
                name: 'Turkey',
                description: 'Where East meets West with rich history and stunning landmarks.',
                image: '{{ url_for("static", filename="images/countries/turkey.jpg") }}'
            },
            {
                name: 'Spain',
                description: 'Flamenco, sun-soaked beaches, and vibrant Mediterranean culture.',
                image: '{{ url_for("static", filename="images/countries/spain.jpg") }}'
            },
            {
                name: 'Brazil',
                description: 'Rainforests, samba rhythms, and the famous Christ the Redeemer.',
                image: '{{ url_for("static", filename="images/countries/brazil.jpg") }}'
            }
        ];

        // Function to generate country cards
        function generateCountryCards() {
            const grid = document.getElementById('countriesGrid');
            const loading = document.getElementById('loading');

            countriesData.forEach((country, index) => {
                const card = document.createElement('div');
                card.className = 'country-card';
                card.style.animationDelay = `${index * 0.1}s`;
                
                card.innerHTML = `
                    <div class="country-image-wrapper">
                        <img src="${country.image}" alt="${country.name}" class="country-image" loading="lazy">
                        <div class="country-overlay"></div>
                    </div>
                    <div class="country-info">
                        <h3 class="country-name">${country.name}</h3>
                        <p class="country-description">${country.description}</p>
                    </div>
                `;

                grid.appendChild(card);
            });

            // Hide loading indicator
            loading.style.display = 'none';

            // Add hover effects
            addCardHoverEffects();
        }

        // Add hover effects to cards
        function addCardHoverEffects() {
            const cards = document.querySelectorAll('.country-card');
            cards.forEach(card => {
                card.addEventListener('mouseenter', function() {
                    const img = this.querySelector('.country-image');
                    img.style.transform = 'scale(1.15) rotate(2deg)';
                });

                card.addEventListener('mouseleave', function() {
                    const img = this.querySelector('.country-image');
                    img.style.transform = 'scale(1) rotate(0deg)';
                });
            });
        }

        // Navigation
        function goBackToHero() {
            const grid = document.querySelector('.countries-grid');
            grid.style.animation = 'fade-out-down 0.6s ease forwards';
            
            setTimeout(() => {
                window.location.href = '/hero';
            }, 600);
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            generateCountryCards();
            
            // Page transition animation
            const header = document.querySelector('.countries-header');
            header.style.animation = 'fade-in-down 0.8s ease forwards';
        });

        // Intersection Observer for scroll animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '50px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        // Observe cards as they load
        setTimeout(() => {
            document.querySelectorAll('.country-card').forEach(card => {
                observer.observe(card);
            });
        }, 500);
    </script>
</body>
</html>
