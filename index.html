<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Khushi 🌸</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="welcome-page">
    <!-- Animated Background -->
    <div class="animated-background">
        <div class="gradient-bg"></div>
        <div class="floating-particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
    </div>

    <!-- Floating Stars -->
    <div class="stars-container">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
    </div>

    <!-- Welcome Card -->
    <div class="welcome-container">
        <div class="welcome-card">
            <!-- Glowing Border Effect -->
            <div class="card-glow"></div>

            <!-- Content -->
            <div class="welcome-content">
                <h1 class="welcome-title">Welcome</h1>
                <h2 class="friend-name" id="friend-name">Khushi</h2>
                
                <p class="welcome-subtitle">
                    🌸 A small world made specially for you 🌸
                </p>

                <!-- Typing Animation -->
                <p class="typing-animation" id="typing-text"></p>

                <!-- Buttons -->
                <div class="button-group">
                    <button class="glow-button enter-btn" onclick="goToHero()">
                        <span class="button-text">Enter</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>

                <!-- Alternative Entry -->
                <div class="name-entry">
                    <p class="or-text">or</p>
                    <button class="name-button" onclick="goToHero()">
                        Khushi ✨
                    </button>
                </div>

                <!-- Decorative Hearts -->
                <div class="hearts">
                    <span class="heart">💜</span>
                    <span class="heart">🌸</span>
                    <span class="heart">💜</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Smooth Scroll Script -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        // Typing animation for welcome message
        function initTypingAnimation() {
            const typingText = document.getElementById('typing-text');
            const messages = [
                'You deserve the world...',
                'And beyond...',
                'Come explore with me ✨'
            ];
            
            let messageIndex = 0;
            let charIndex = 0;
            let isDeleting = false;

            function type() {
                const currentMessage = messages[messageIndex];
                
                if (!isDeleting) {
                    typingText.textContent = currentMessage.substring(0, charIndex + 1);
                    charIndex++;

                    if (charIndex === currentMessage.length) {
                        isDeleting = true;
                        setTimeout(type, 2000);
                        return;
                    }
                } else {
                    typingText.textContent = currentMessage.substring(0, charIndex - 1);
                    charIndex--;

                    if (charIndex === 0) {
                        isDeleting = false;
                        messageIndex = (messageIndex + 1) % messages.length;
                        setTimeout(type, 500);
                        return;
                    }
                }

                setTimeout(type, 80);
            }

            type();
        }

        // Navigate to hero page with smooth transition
        function goToHero() {
            const card = document.querySelector('.welcome-card');
            card.style.animation = 'fade-out-up 0.6s ease forwards';
            
            setTimeout(() => {
                window.location.href = '/hero';
            }, 600);
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            initTypingAnimation();
        });

        // Add ripple effect to buttons
        document.querySelectorAll('.glow-button, .name-button').forEach(button => {
            button.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;

                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                ripple.classList.add('ripple');

                this.appendChild(ripple);

                setTimeout(() => ripple.remove(), 600);
            });
        });
    </script>
</body>
</html>
